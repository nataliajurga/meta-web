<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natalia's Meta-Web</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#faf9f7; --bg2:#f2f0ec; --text:#2c2c2a; --text2:#5f5e5a; --text3:#888780;
  --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.16);
  --ci:#534AB7; --cc:#0F6E56; --cq:#993C1D; --cp:#993556; --cn:#5F5E5A;
  --li:#EEEDFE; --lc:#E1F5EE; --lq:#FAECE7; --lp:#FBEAF0; --ln:#F1EFE8;
}
@media (prefers-color-scheme:dark){:root{
  --bg:#1c1c1a; --bg2:#252523; --text:#e8e6e0; --text2:#b4b2a9; --text3:#888780;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --ci:#AFA9EC; --cc:#5DCAA5; --cq:#F0997B; --cp:#ED93B1; --cn:#B4B2A9;
  --li:#26215C; --lc:#04342C; --lq:#4A1B0C; --lp:#4B1528; --ln:#2C2C2A;
}}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;}
#app{display:flex;width:100%;height:100%;}
#canvas{flex:1;position:relative;overflow:hidden;}
svg#graph{width:100%;height:100%;display:block;}
.node-g{cursor:pointer;}
.node-g circle,.node-g text{pointer-events:none;}
.edge-line{fill:none;pointer-events:none;}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.65}}
.pulse-ring{animation:pulse 2.8s ease-in-out infinite;fill:none;pointer-events:none;}

/* zoom controls */
#zoom-bar{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:0;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:24px;overflow:hidden;z-index:20;box-shadow:0 1px 6px rgba(0,0,0,.07);
}
.zb{background:none;border:none;cursor:pointer;color:var(--text2);
  font-size:20px;line-height:1;padding:5px 18px;transition:background .12s,color .12s;}
.zb:hover{background:var(--border);color:var(--text);}
.zb:disabled{opacity:.25;cursor:default;}
#zlabel{font-size:11px;color:var(--text3);padding:0 14px;
  border-left:1px solid var(--border2);border-right:1px solid var(--border2);
  min-width:90px;text-align:center;user-select:none;line-height:32px;}

/* depth pips */
#pips{position:absolute;top:14px;right:14px;display:flex;gap:5px;align-items:center;}
.pip{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:background .3s,transform .3s;}
.pip.on{transform:scale(1.5);}
.pip[data-d="0"].on{background:var(--ci);}
.pip[data-d="1"].on{background:var(--cc);}
.pip[data-d="2"].on{background:var(--cq);}

/* panel */
#panel{width:270px;height:100%;background:var(--bg2);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;transition:width .22s ease;flex-shrink:0;}
#panel.collapsed{width:0;border:none;}
#ph{padding:16px 16px 10px;border-bottom:1px solid var(--border);position:relative;}
#pbadge{display:inline-block;font-size:9px;font-weight:500;letter-spacing:.07em;
  text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-bottom:4px;}
#pdepth{font-size:9px;color:var(--text3);margin-bottom:3px;}
#plabel{font-size:14px;font-weight:500;line-height:1.3;}
#pclose{position:absolute;top:12px;right:10px;background:none;border:none;
  cursor:pointer;color:var(--text3);font-size:18px;}
#pclose:hover{color:var(--text);}
#pb{flex:1;overflow-y:auto;padding:14px 16px 24px;}
.psec{margin-bottom:16px;}
.ptitle{font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.pdesc{font-size:12px;line-height:1.6;color:var(--text2);}
.ci{display:flex;align-items:flex-start;gap:7px;padding:6px 8px;border-radius:5px;
  border:1px solid var(--border);background:var(--bg);margin-bottom:5px;}
.ci.live{cursor:pointer;}.ci.live:hover{border-color:var(--border2);}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.clabel{font-size:11px;font-weight:500;}
.crel{font-size:10px;color:var(--text3);margin-top:1px;}
.chint{font-size:10px;color:var(--text3);font-style:italic;margin-top:1px;}

/* toolbar */
#toolbar{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:6px;z-index:10;}
#searchbox{font-size:11px;padding:5px 9px;border-radius:6px;
  border:1px solid var(--border2);background:var(--bg2);color:var(--text);width:180px;outline:none;}
#searchbox::placeholder{color:var(--text3);}
#filters{display:flex;gap:4px;flex-wrap:wrap;}
.fb{font-size:10px;padding:3px 8px;border-radius:12px;border:1px solid var(--border2);
  background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .12s;}
.fb:hover,.fb.on{background:var(--text);color:var(--bg);border-color:var(--text);}

/* legend */
#legend{position:absolute;bottom:58px;left:12px;background:var(--bg2);
  border:1px solid var(--border);border-radius:6px;padding:9px 12px;}
#ltitle{font-size:9px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:7px;}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:10px;color:var(--text2);}
.lr:last-child{margin-bottom:0;}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
</style>
</head>
<body>
<div id="app">
  <div id="canvas">
    <svg id="graph">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      <g id="zg"><g id="eg"></g><g id="ng"></g></g>
    </svg>
    <div id="toolbar">
      <input id="searchbox" type="text" placeholder="Search…" autocomplete="off"/>
      <div id="filters">
        <button class="fb on" data-t="all">all</button>
        <button class="fb" data-t="intuition">intuitions</button>
        <button class="fb" data-t="concept">concepts</button>
        <button class="fb" data-t="question">questions</button>
        <button class="fb" data-t="paper">papers</button>
      </div>
    </div>
    <div id="pips">
      <div class="pip on" data-d="0"></div>
      <div class="pip" data-d="1"></div>
      <div class="pip" data-d="2"></div>
    </div>
    <div id="zoom-bar">
      <button class="zb" id="btn-out" disabled>−</button>
      <div id="zlabel">intuitions</div>
      <button class="zb" id="btn-in">+</button>
    </div>
    <div id="legend">
      <div id="ltitle">+ reveals</div>
      <div class="lr"><div class="ld" style="background:var(--ci)"></div>intuitions — always</div>
      <div class="lr"><div class="ld" style="background:var(--cc)"></div>concepts — level 2</div>
      <div class="lr"><div class="ld" style="background:var(--cq)"></div>questions · papers — level 3</div>
    </div>
  </div>

  <div id="panel" class="collapsed">
    <div id="ph">
      <div id="pbadge"></div>
      <div id="pdepth"></div>
      <div id="plabel"></div>
      <button id="pclose">×</button>
    </div>
    <div id="pb">
      <div class="psec"><div class="ptitle">Description</div><div class="pdesc" id="pdesc"></div></div>
      <div class="psec"><div class="ptitle">Connections</div><div id="pconns"></div></div>
      <div class="psec" id="psrc" style="display:none">
        <div class="ptitle">From chat</div><div class="pdesc" id="psrct"></div>
      </div>
    </div>
  </div>
</div>

<script>
const GRAPH_URL = 'graph.json';
const TC={intuition:'var(--ci)',concept:'var(--cc)',question:'var(--cq)',paper:'var(--cp)',person:'var(--cn)'};
const TL={intuition:'var(--li)',concept:'var(--lc)',question:'var(--lq)',paper:'var(--lp)',person:'var(--ln)'};
const TR={intuition:20,concept:14,question:11,paper:9,person:9};
const DL=['fundamental intuition','mathematical concept','open question · reference'];
const EOP={high:.55,medium:.26,speculative:.1};

/* LOD levels — maxDepth shown, label, zoom multiplier relative to fit scale */
const LEVELS=[
  {maxDepth:0, label:'intuitions',  mult:1.0},
  {maxDepth:1, label:'+ concepts',  mult:1.7},
  {maxDepth:2, label:'+ questions', mult:2.8},
];
const MAX_LEVEL = LEVELS.length - 1;

let gdata, sim, nsel, esel, zb;
let levelIdx=0, fitScale=1, fitTx=0, fitTy=0;
let filter='all', query='', selected=null;
let simNodes=[], simEdges=[];

const col  = t => TC[t]||TC.person;
const lcol = t => TL[t]||TL.person;
const rad  = t => TR[t]||11;
const md   = ()=> LEVELS[levelIdx].maxDepth;

async function init(){
  const r=await fetch(GRAPH_URL);
  gdata=await r.json();
  build();
  wireUI();
}

function build(){
  const svg=d3.select('#graph');
  d3.select('#eg').selectAll('*').remove();
  d3.select('#ng').selectAll('*').remove();

  const W=document.getElementById('canvas').clientWidth;
  const H=document.getElementById('canvas').clientHeight;

  const nodes=gdata.nodes.filter(n=>{
    if(filter!=='all'&&n.type!==filter)return false;
    if(query&&!n.label.toLowerCase().includes(query)&&!(n.description||'').toLowerCase().includes(query))return false;
    return true;
  });
  const nids=new Set(nodes.map(n=>n.id));
  const edges=gdata.edges.filter(e=>nids.has(e.source)&&nids.has(e.target));

  simNodes=nodes.map(n=>({...n}));
  const imap={};
  simNodes.forEach(n=>imap[n.id]=n);
  simEdges=edges.map(e=>({...e,source:imap[e.source],target:imap[e.target]})).filter(e=>e.source&&e.target);

  if(sim)sim.stop();
  sim=d3.forceSimulation(simNodes)
    .force('link',d3.forceLink(simEdges).id(d=>d.id)
      .distance(d=>(80+rad(d.source.type)+rad(d.target.type))*(d.source.depth===d.target.depth?.75:1.2))
      .strength(.3))
    .force('charge',d3.forceManyBody().strength(d=>-rad(d.type)*22))
    .force('center',d3.forceCenter(W/2,H/2))
    .force('collide',d3.forceCollide(d=>rad(d.type)+18));

  esel=d3.select('#eg').selectAll('line').data(simEdges).enter().append('line')
    .attr('class','edge-line')
    .attr('stroke-width',d=>d.confidence==='high'?1.5:1)
    .attr('stroke-dasharray',d=>d.confidence==='speculative'?'4 3':'none')
    .attr('marker-end','url(#arr)');

  const ng=d3.select('#ng').selectAll('g').data(simNodes).enter().append('g')
    .attr('class','node-g')
    .call(d3.drag()
      .on('start',(ev,d)=>{if(!ev.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag', (ev,d)=>{d.fx=ev.x;d.fy=ev.y;})
      .on('end',  (ev,d)=>{if(!ev.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}))
    .on('click',(ev,d)=>{ev.stopPropagation();onNodeClick(d);});

  ng.filter(d=>d.depth===0).append('circle')
    .attr('class','pulse-ring')
    .attr('r',d=>rad(d.type)+8)
    .attr('stroke',d=>col(d.type))
    .attr('stroke-width',1.5);

  ng.append('circle')
    .attr('r',d=>rad(d.type))
    .attr('fill',d=>col(d.type))
    .attr('fill-opacity',.18)
    .attr('stroke',d=>col(d.type))
    .attr('stroke-width',d=>d.depth===0?2.5:1.5);

  ng.append('text')
    .attr('text-anchor','middle')
    .attr('dy',d=>rad(d.type)+14)
    .style('font-size',d=>d.depth===0?'12px':'10px')
    .style('font-weight',d=>d.depth===0?'500':'400')
    .text(d=>d.label.length>24?d.label.slice(0,22)+'…':d.label);

  nsel=ng;

  zb=d3.zoom().scaleExtent([.2,8])
    .on('zoom',ev=>{
      d3.select('#zg').attr('transform',ev.transform);
      /* keep levelIdx in sync if user scroll-zooms */
      const k=ev.transform.k;
      if(fitScale>0){
        const rel=k/fitScale;
        let li=0;
        for(let i=0;i<LEVELS.length;i++){if(rel>=LEVELS[i].mult*.95)li=i;}
        if(li!==levelIdx){levelIdx=li;applyLOD();updateUI();}
      }
    });

  svg.call(zb).on('click',()=>{selected=null;clearHL();closePanel();});

  /* run sim until it cools, then fit and apply LOD */
  let ticks=0;
  sim.on('tick',()=>{
    ticks++;
    esel
      .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
      .attr('x2',d=>{const dx=d.target.x-d.source.x,dy=d.target.y-d.source.y,dist=Math.sqrt(dx*dx+dy*dy)||1;return d.target.x-(dx/dist)*(rad(d.target.type)+3);})
      .attr('y2',d=>{const dx=d.target.x-d.source.x,dy=d.target.y-d.source.y,dist=Math.sqrt(dx*dx+dy*dy)||1;return d.target.y-(dy/dist)*(rad(d.target.type)+3);});
    nsel.attr('transform',d=>`translate(${d.x},${d.y})`);

    /* auto-fit after sim has settled (~120 ticks) */
    if(ticks===120){
      fitToScreen();
      applyLOD();
      updateUI();
    }
  });
}

function fitToScreen(){
  const W=document.getElementById('canvas').clientWidth;
  const H=document.getElementById('canvas').clientHeight;
  const PAD=60;

  /* compute bounding box of ALL nodes */
  const xs=simNodes.map(n=>n.x);
  const ys=simNodes.map(n=>n.y);
  const x0=Math.min(...xs)-PAD, x1=Math.max(...xs)+PAD;
  const y0=Math.min(...ys)-PAD, y1=Math.max(...ys)+PAD;
  const bw=x1-x0, bh=y1-y0;

  fitScale=Math.min(W/bw, H/bh, 1.5); /* never zoom in past 1.5× on load */
  fitTx=W/2-fitScale*(x0+bw/2);
  fitTy=H/2-fitScale*(y0+bh/2);

  const t=d3.zoomIdentity.translate(fitTx,fitTy).scale(fitScale);
  d3.select('#graph').call(zb.transform, t);
}

function applyLOD(){
  if(!nsel||!esel)return;
  const cur=md();
  nsel.style('opacity',d=>(d.depth??0)>cur?0:1)
      .style('pointer-events',d=>(d.depth??0)>cur?'none':'all');
  esel.style('opacity',d=>{
    if((d.source.depth??0)>cur||(d.target.depth??0)>cur)return 0;
    return EOP[d.confidence]||EOP.medium;
  }).attr('stroke',d=>`rgba(136,135,128,${EOP[d.confidence]||EOP.medium})`);
}

function updateUI(){
  const cur=md();
  document.querySelectorAll('.pip').forEach(p=>{
    p.classList.toggle('on',parseInt(p.dataset.d)<=cur);
  });
  document.getElementById('zlabel').textContent=LEVELS[levelIdx].label;
  document.getElementById('btn-out').disabled=levelIdx===0;
  document.getElementById('btn-in').disabled=levelIdx===MAX_LEVEL;
}

function zoomTo(idx){
  idx=Math.max(0,Math.min(MAX_LEVEL,idx));
  levelIdx=idx;
  const W=document.getElementById('canvas').clientWidth;
  const H=document.getElementById('canvas').clientHeight;
  /* scale relative to the fit scale so the graph always looks right-sized */
  const targetScale=fitScale*LEVELS[idx].mult;
  const t=d3.zoomIdentity.translate(W/2,H/2).scale(targetScale).translate(-W/2,-H/2)
    /* re-apply the fit translation so centre stays centred */
    .translate((fitTx-W/2)/targetScale*fitScale+W/2/targetScale-W/2/targetScale,
               (fitTy-H/2)/targetScale*fitScale+H/2/targetScale-H/2/targetScale);

  /* simpler: just scale from current centre */
  const curT=d3.zoomTransform(document.getElementById('graph'));
  const scaleBy=targetScale/curT.k;
  d3.select('#graph').transition().duration(480)
    .call(zb.scaleBy, scaleBy);

  applyLOD();
  updateUI();
}

function onNodeClick(d){
  if((d.depth??0)>md())return;
  selected=d;
  highlightNbhd(d);
  showPanel(d);
}

function highlightNbhd(d){
  const cids=new Set([d.id]);
  const ceidx=new Set();
  simEdges.forEach((e,i)=>{
    if(e.source.id===d.id||e.target.id===d.id){cids.add(e.source.id);cids.add(e.target.id);ceidx.add(i);}
  });
  const cur=md();
  nsel.style('opacity',n=>(n.depth??0)>cur?0:cids.has(n.id)?1:.1);
  esel.style('opacity',(e,i)=>{
    if((e.source.depth??0)>cur||(e.target.depth??0)>cur)return 0;
    return ceidx.has(i)?Math.min(1,(EOP[e.confidence]||EOP.medium)*4):(EOP[e.confidence]||EOP.medium)*.15;
  });
}

function clearHL(){applyLOD();}

function showPanel(d){
  document.getElementById('panel').classList.remove('collapsed');
  const badge=document.getElementById('pbadge');
  badge.textContent=d.type;badge.style.background=lcol(d.type);badge.style.color=col(d.type);
  document.getElementById('pdepth').textContent=DL[d.depth??0]||'';
  document.getElementById('plabel').textContent=d.label;
  document.getElementById('pdesc').textContent=d.description||'No description yet.';
  const cur=md();
  const conns=simEdges.filter(e=>e.source.id===d.id||e.target.id===d.id);
  const cd=document.getElementById('pconns');
  cd.innerHTML='';
  if(!conns.length){cd.innerHTML='<div class="pdesc" style="color:var(--text3)">No connections yet.</div>';}
  else conns.forEach(e=>{
    const other=e.source.id===d.id?e.target:e.source;
    const vis=(other.depth??0)<=cur;
    const dir=e.source.id===d.id?'→':'←';
    const el=document.createElement('div');
    el.className='ci'+(vis?' live':'');
    el.innerHTML=`<div class="cdot" style="background:${col(other.type)};opacity:${vis?1:.3}"></div>
      <div><div class="clabel" style="opacity:${vis?1:.4}">${dir} ${other.label}</div>
      <div class="crel">${e.relation.replace(/-/g,' ')}</div>
      ${!vis?'<div class="chint">zoom in to reveal</div>':''}</div>`;
    cd.appendChild(el);
  });
  const srcs=(d.sources||[]).filter(s=>s!=='seed');
  document.getElementById('psrc').style.display=srcs.length?'block':'none';
  document.getElementById('psrct').textContent=srcs.join(', ');
}

function closePanel(){document.getElementById('panel').classList.add('collapsed');}

function wireUI(){
  document.getElementById('btn-in').onclick=()=>zoomTo(levelIdx+1);
  document.getElementById('btn-out').onclick=()=>zoomTo(levelIdx-1);
  document.querySelectorAll('.fb').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');filter=b.dataset.t;selected=null;closePanel();build();
  }));
  document.getElementById('searchbox').addEventListener('input',e=>{
    query=e.target.value.toLowerCase().trim();selected=null;closePanel();build();
  });
  document.getElementById('pclose').addEventListener('click',()=>{selected=null;clearHL();closePanel();});
}

init();
</script>
</body>
</html>
