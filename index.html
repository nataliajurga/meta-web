<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natalia's Meta-Web</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f7;
    --bg2: #f2f0ec;
    --text: #2c2c2a;
    --text2: #5f5e5a;
    --text3: #888780;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --intuition: #534AB7;
    --intuition-light: #EEEDFE;
    --intuition-mid: #AFA9EC;
    --concept: #0F6E56;
    --concept-light: #E1F5EE;
    --concept-mid: #5DCAA5;
    --question: #993C1D;
    --question-light: #FAECE7;
    --question-mid: #F0997B;
    --paper: #993556;
    --paper-light: #FBEAF0;
    --paper-mid: #ED93B1;
    --person: #5F5E5A;
    --person-light: #F1EFE8;
    --person-mid: #B4B2A9;
    --edge-high: rgba(0,0,0,0.35);
    --edge-med: rgba(0,0,0,0.18);
    --edge-spec: rgba(0,0,0,0.09);
    --radius: 8px;
    --panel: 300px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --text: #e8e6e0;
      --text2: #b4b2a9;
      --text3: #888780;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --intuition: #AFA9EC;
      --intuition-light: #26215C;
      --intuition-mid: #7F77DD;
      --concept: #5DCAA5;
      --concept-light: #04342C;
      --concept-mid: #1D9E75;
      --question: #F0997B;
      --question-light: #4A1B0C;
      --question-mid: #D85A30;
      --paper: #ED93B1;
      --paper-light: #4B1528;
      --paper-mid: #D4537E;
      --person: #B4B2A9;
      --person-light: #2C2C2A;
      --person-mid: #888780;
      --edge-high: rgba(255,255,255,0.3);
      --edge-med: rgba(255,255,255,0.14);
      --edge-spec: rgba(255,255,255,0.06);
    }
  }

  html, body {
    width: 100%; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  #app { display: flex; width: 100%; height: 100%; }

  /* ── Canvas ── */
  #canvas { flex: 1; position: relative; }
  svg#graph { width: 100%; height: 100%; display: block; }

  /* ── Nodes ── */
  .node circle {
    stroke-width: 1.5;
    cursor: pointer;
    transition: r 0.15s, opacity 0.2s;
  }
  .node:hover circle { opacity: 0.85; }
  .node text {
    font-size: 12px;
    fill: var(--text);
    pointer-events: none;
    user-select: none;
  }
  .node.dimmed circle { opacity: 0.2; }
  .node.dimmed text { opacity: 0.15; }

  /* ── Edges ── */
  .edge {
    fill: none;
    stroke-width: 1.5;
    transition: opacity 0.2s;
  }
  .edge.dimmed { opacity: 0.05; }
  .edge-label {
    font-size: 10px;
    fill: var(--text3);
    pointer-events: none;
    user-select: none;
  }

  /* ── Side panel ── */
  #panel {
    width: var(--panel);
    height: 100%;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.25s ease;
    flex-shrink: 0;
  }
  #panel.collapsed { width: 0; border: none; }

  #panel-header {
    padding: 20px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  #panel-type-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 6px;
  }
  #panel-label {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.3;
    color: var(--text);
  }
  #panel-close {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 18px;
    line-height: 1;
    padding: 2px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  #panel-close:hover { color: var(--text); }

  #panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 24px;
  }
  .panel-section { margin-bottom: 20px; }
  .panel-section-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .panel-desc {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text2);
  }
  .connection-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .connection-item:hover { border-color: var(--border2); }
  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .conn-label { font-size: 12px; color: var(--text); font-weight: 500; }
  .conn-rel { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* ── Legend ── */
  #legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 11px;
    line-height: 1;
  }
  #legend-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 7px;
  }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-label { color: var(--text2); }

  /* ── Controls ── */
  #controls {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  #search-wrap {
    position: relative;
  }
  #search {
    font-size: 12px;
    padding: 6px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    width: 200px;
    outline: none;
  }
  #search:focus { border-color: var(--border2); }
  #search::placeholder { color: var(--text3); }

  /* ── Empty state ── */
  #empty {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
    display: none;
  }
</style>
</head>
<body>
<div id="app">
  <div id="canvas">
    <svg id="graph">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      <g id="zoom-group">
        <g id="edges-g"></g>
        <g id="nodes-g"></g>
      </g>
    </svg>
    <div id="controls">
      <div id="search-wrap">
        <input id="search" type="text" placeholder="Search nodes…" autocomplete="off"/>
      </div>
      <div id="filter-bar">
        <button class="filter-btn active" data-type="all">all</button>
        <button class="filter-btn" data-type="intuition">intuitions</button>
        <button class="filter-btn" data-type="concept">concepts</button>
        <button class="filter-btn" data-type="question">questions</button>
        <button class="filter-btn" data-type="paper">papers</button>
      </div>
    </div>
    <div id="legend">
      <div id="legend-title">Node type</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--intuition)"></div><span class="legend-label">intuition</span></div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--concept)"></div><span class="legend-label">concept</span></div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--question)"></div><span class="legend-label">question</span></div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--paper)"></div><span class="legend-label">paper / person</span></div>
    </div>
    <div id="empty">No nodes match this filter.</div>
  </div>

  <div id="panel" class="collapsed">
    <div id="panel-header">
      <div>
        <div id="panel-type-badge"></div>
        <div id="panel-label"></div>
      </div>
      <button id="panel-close">×</button>
    </div>
    <div id="panel-body">
      <div class="panel-section">
        <div class="panel-section-title">Description</div>
        <div class="panel-desc" id="panel-desc"></div>
      </div>
      <div class="panel-section" id="panel-connections-section">
        <div class="panel-section-title">Connections</div>
        <div id="panel-connections"></div>
      </div>
      <div class="panel-section" id="panel-sources-section">
        <div class="panel-section-title">Sources</div>
        <div class="panel-desc" id="panel-sources"></div>
      </div>
    </div>
  </div>
</div>

<script>
const GRAPH_URL = 'graph.json';

const TYPE_COLOR = {
  intuition: 'var(--intuition)',
  concept:   'var(--concept)',
  question:  'var(--question)',
  paper:     'var(--paper)',
  person:    'var(--person)',
};
const TYPE_LIGHT = {
  intuition: 'var(--intuition-light)',
  concept:   'var(--concept-light)',
  question:  'var(--question-light)',
  paper:     'var(--paper-light)',
  person:    'var(--person-light)',
};
const NODE_RADIUS = { intuition: 20, concept: 16, question: 13, paper: 10, person: 10 };
const EDGE_OPACITY = { high: 'var(--edge-high)', medium: 'var(--edge-med)', speculative: 'var(--edge-spec)' };

let graphData, simulation, selectedNode = null, activeFilter = 'all', searchQuery = '';

async function init() {
  const resp = await fetch(GRAPH_URL);
  graphData = await resp.json();
  renderGraph();
}

function getColor(type) { return TYPE_COLOR[type] || TYPE_COLOR.person; }
function getRadius(type) { return NODE_RADIUS[type] || 12; }

function visibleNodes() {
  return graphData.nodes.filter(n => {
    const typeOk = activeFilter === 'all' || n.type === activeFilter;
    const searchOk = !searchQuery || n.label.toLowerCase().includes(searchQuery) || (n.description||'').toLowerCase().includes(searchQuery);
    return typeOk && searchOk;
  });
}

function renderGraph() {
  const svg = d3.select('#graph');
  const g = d3.select('#zoom-group');
  d3.select('#edges-g').selectAll('*').remove();
  d3.select('#nodes-g').selectAll('*').remove();

  const nodes = visibleNodes();
  const nodeIds = new Set(nodes.map(n => n.id));
  const edges = graphData.edges.filter(e => nodeIds.has(e.source) && nodeIds.has(e.target));

  document.getElementById('empty').style.display = nodes.length === 0 ? 'block' : 'none';

  const W = document.getElementById('canvas').clientWidth;
  const H = document.getElementById('canvas').clientHeight;

  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });

  const simNodes = nodes.map(n => ({ ...n }));
  const simEdges = edges.map(e => ({
    ...e,
    source: simNodes.find(n => n.id === e.source),
    target: simNodes.find(n => n.id === e.target),
  })).filter(e => e.source && e.target);

  simulation = d3.forceSimulation(simNodes)
    .force('link', d3.forceLink(simEdges).id(d => d.id).distance(d => {
      const sr = getRadius(d.source.type), tr = getRadius(d.target.type);
      return 80 + sr + tr;
    }).strength(0.4))
    .force('charge', d3.forceManyBody().strength(d => -getRadius(d.type) * 18))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(d => getRadius(d.type) + 18));

  const edgeG = d3.select('#edges-g').selectAll('.edge-group')
    .data(simEdges)
    .enter()
    .append('g')
    .attr('class', 'edge-group');

  const edgeLine = edgeG.append('line')
    .attr('class', 'edge')
    .attr('stroke', d => EDGE_OPACITY[d.confidence] || EDGE_OPACITY.medium)
    .attr('marker-end', 'url(#arr)');

  const nodeG = d3.select('#nodes-g').selectAll('.node')
    .data(simNodes)
    .enter()
    .append('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (event, d) => {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      })
    )
    .on('click', (event, d) => {
      event.stopPropagation();
      selectNode(d, simNodes, simEdges, edgeG, nodeG);
    });

  nodeG.append('circle')
    .attr('r', d => getRadius(d.type))
    .attr('fill', d => getColor(d.type))
    .attr('fill-opacity', 0.2)
    .attr('stroke', d => getColor(d.type))
    .attr('stroke-width', d => d.type === 'intuition' ? 2 : 1.5);

  nodeG.append('text')
    .attr('dy', d => getRadius(d.type) + 14)
    .attr('text-anchor', 'middle')
    .text(d => d.label);

  svg.on('click', () => {
    selectedNode = null;
    nodeG.classed('dimmed', false);
    edgeG.classed('dimmed', false);
    collapsePanel();
  });

  const zoom = d3.zoom()
    .scaleExtent([0.3, 3])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  simulation.on('tick', () => {
    edgeLine
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => {
        const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        return d.target.x - (dx/dist) * (getRadius(d.target.type) + 4);
      })
      .attr('y2', d => {
        const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        return d.target.y - (dy/dist) * (getRadius(d.target.type) + 4);
      });

    nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

function selectNode(d, simNodes, simEdges, edgeG, nodeG) {
  selectedNode = d;

  const connectedIds = new Set([d.id]);
  const connectedEdges = new Set();
  simEdges.forEach((e, i) => {
    if (e.source.id === d.id || e.target.id === d.id) {
      connectedIds.add(e.source.id);
      connectedIds.add(e.target.id);
      connectedEdges.add(i);
    }
  });

  nodeG.classed('dimmed', n => !connectedIds.has(n.id));
  edgeG.classed('dimmed', (e, i) => !connectedEdges.has(i));

  showPanel(d, simEdges);
}

function showPanel(d, simEdges) {
  const panel = document.getElementById('panel');
  panel.classList.remove('collapsed');

  const badge = document.getElementById('panel-type-badge');
  badge.textContent = d.type;
  badge.style.background = TYPE_LIGHT[d.type] || TYPE_LIGHT.person;
  badge.style.color = getColor(d.type).replace('var(', '').replace(')', '');
  badge.style.color = getColor(d.type);

  document.getElementById('panel-label').textContent = d.label;
  document.getElementById('panel-desc').textContent = d.description || 'No description yet.';

  const conns = simEdges.filter(e => e.source.id === d.id || e.target.id === d.id);
  const connDiv = document.getElementById('panel-connections');
  connDiv.innerHTML = '';
  if (conns.length === 0) {
    connDiv.innerHTML = '<div class="panel-desc" style="color:var(--text3)">No connections yet.</div>';
  } else {
    conns.forEach(e => {
      const other = e.source.id === d.id ? e.target : e.source;
      const direction = e.source.id === d.id ? '→' : '←';
      const item = document.createElement('div');
      item.className = 'connection-item';
      item.innerHTML = `
        <div class="conn-dot" style="background:${getColor(other.type)}"></div>
        <div>
          <div class="conn-label">${direction} ${other.label}</div>
          <div class="conn-rel">${e.relation.replace(/-/g,' ')}</div>
        </div>`;
      connDiv.appendChild(item);
    });
  }

  const sources = (d.sources || []).filter(s => s !== 'seed');
  const srcEl = document.getElementById('panel-sources');
  document.getElementById('panel-sources-section').style.display = sources.length ? 'block' : 'none';
  srcEl.textContent = sources.join(', ');
}

function collapsePanel() {
  document.getElementById('panel').classList.add('collapsed');
}

document.getElementById('panel-close').addEventListener('click', () => {
  selectedNode = null;
  collapsePanel();
  d3.selectAll('.node').classed('dimmed', false);
  d3.selectAll('.edge-group').classed('dimmed', false);
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.type;
    selectedNode = null;
    collapsePanel();
    renderGraph();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  selectedNode = null;
  collapsePanel();
  renderGraph();
});

init();
</script>
</body>
</html>
